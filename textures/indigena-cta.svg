<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80">
  <!-- Bordas externas -->
  <line x1="0" y1="2"  x2="200" y2="2"  stroke="#0A0A0A" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="0" y1="78" x2="200" y2="78" stroke="#0A0A0A" stroke-width="1.5" stroke-opacity="0.18"/>
  <line x1="0" y1="7"  x2="200" y2="7"  stroke="#0A0A0A" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="73" x2="200" y2="73" stroke="#0A0A0A" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Diamante principal -->
  <polygon points="100,14 160,40 100,66 40,40" fill="none" stroke="#0A0A0A" stroke-width="1.2" stroke-opacity="0.22"/>

  <!-- Linhas internas horizontais -->
  <line x1="40"  y1="40" x2="160" y2="40" stroke="#0A0A0A" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="56"  y1="31" x2="144" y2="31" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="56"  y1="49" x2="144" y2="49" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.08"/>
  <line x1="72"  y1="22" x2="128" y2="22" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="72"  y1="58" x2="128" y2="58" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.06"/>

  <!-- Linhas internas verticais -->
  <line x1="100" y1="14" x2="100" y2="66" stroke="#0A0A0A" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="85"  y1="19" x2="85"  y2="61" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.07"/>
  <line x1="115" y1="19" x2="115" y2="61" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.07"/>

  <!-- Diagonais cruzadas -->
  <line x1="59"  y1="22" x2="141" y2="58" stroke="#0A0A0A" stroke-width="0.4" stroke-opacity="0.10"/>
  <line x1="59"  y1="58" x2="141" y2="22" stroke="#0A0A0A" stroke-width="0.4" stroke-opacity="0.10"/>
  <line x1="47"  y1="34" x2="153" y2="46" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.07"/>
  <line x1="47"  y1="46" x2="153" y2="34" stroke="#0A0A0A" stroke-width="0.3" stroke-opacity="0.07"/>

  <!-- Acento central -->
  <polygon points="100,36 104,40 100,44 96,40" fill="#0A0A0A" fill-opacity="0.20"/>

  <!-- Chevron superior -->
  <polyline points="92,14 100,8  108,14" fill="none" stroke="#0A0A0A" stroke-width="0.9" stroke-opacity="0.16"/>
  <polyline points="87,13 100,4  113,13" fill="none" stroke="#0A0A0A" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Chevron inferior -->
  <polyline points="92,66 100,72 108,66" fill="none" stroke="#0A0A0A" stroke-width="0.9" stroke-opacity="0.16"/>
  <polyline points="87,67 100,76 113,67" fill="none" stroke="#0A0A0A" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Conector borda esquerda -->
  <polyline points="0,31 12,40 0,49"   fill="none" stroke="#0A0A0A" stroke-width="1.0" stroke-opacity="0.20"/>
  <!-- Conector borda direita -->
  <polyline points="200,31 188,40 200,49" fill="none" stroke="#0A0A0A" stroke-width="1.0" stroke-opacity="0.20"/>

  <!-- Linhas de conexão -->
  <line x1="12"  y1="40" x2="40"  y2="40" stroke="#0A0A0A" stroke-width="0.7" stroke-opacity="0.12"/>
  <line x1="160" y1="40" x2="188" y2="40" stroke="#0A0A0A" stroke-width="0.7" stroke-opacity="0.12"/>
</svg>
